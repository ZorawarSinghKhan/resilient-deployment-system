apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: chaos-app-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: chaos-app
    rules:
    - alert: PodCrashing
      expr: kube_pod_container_status_restarts_total{namespace="default"} > 3
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod is crashing!"
        description: "Pod {{ $labels.pod }} has restarted more than 3 times"

    - alert: PodNotRunning
      expr: kube_pod_status_phase{phase="Running", namespace="default"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "No pods running!"
        description: "There are no running pods in default namespace"

    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes{namespace="default"} > 100000000
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage!"
        description: "Container {{ $labels.container }} is using too much memory"
